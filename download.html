<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Support Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Customer Support Ticket</h2>

        <div class="mb-3">
            <label class="form-label">Customer Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label class="form-label">Issue</label>
            <textarea id="issue" class="form-control" rows="4" placeholder="Describe your issue"></textarea>
        </div>

        <button class="btn btn-primary w-100" onclick="createTicket()">
            Create Ticket
        </button>

        <div id="result" class="mt-4"></div>

        <button id="downloadBtn" class="btn btn-success w-100 mt-3" onclick="downloadPDF()" style="display:none;">
            Download PDF Ticket
        </button>
    </div>
</div>

<script>
let ticketId = "";
let customerName = "";
let customerIssue = "";
let ticketStatus = "Open";

function createTicket() {

    customerName = document.getElementById("name").value;
    customerIssue = document.getElementById("issue").value;

    if(customerName === "" || customerIssue === ""){
        alert("Please fill all fields");
        return;
    }

    ticketId = "TKT" + Math.floor(Math.random() * 100000);

    document.getElementById("result").innerHTML = `
        <div class="alert alert-success">
            <h5>Ticket Created Successfully!</h5>
            <p><strong>Ticket ID:</strong> ${ticketId}</p>
            <p><strong>Status:</strong> ${ticketStatus}</p>
        </div>
    `;

    document.getElementById("downloadBtn").style.display = "block";
}

function downloadPDF() {

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Customer Support Ticket", 20, 20);

    doc.setFontSize(12);
    doc.text("Ticket ID: " + ticketId, 20, 40);
    doc.text("Customer Name: " + customerName, 20, 55);
    doc.text("Issue: " + customerIssue, 20, 70);
    doc.text("Status: " + ticketStatus, 20, 85);

    doc.save(ticketId + ".pdf");
}
</script>

</body>
</html>
