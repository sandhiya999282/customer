<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="container">
        <div class="card shadow ticket-card">
            <div class="card-headed bg-primary text-light text-center mt-2">
                <h3 class="mt-2"> CUSTOMER SUPPORT TICKET </h3>
            </div> 

            <form action="#" method="post" class="text-center mb-2 my-5 mt-5">   
                <div class="full">
                <div class="form-group1"> 

                    <label class="form-label ms-3">Name:</label>
                <input type="text" placeholder="Enter your name" class="form-label ms-1" required>    <br> <br>


                </div>
                <div class="form-group2 ms-3">
                <label class="form-label ms-1">Age: </label>  
                <input type="number" class="form-label me-1" placeholder="Enter your Current Age"> <br> <br> 

                </div> 

                <div class="form-group3 ms-2">

                
                <label class="form-label"> Email: </label>
                <input type="text" class="form-label" placeholder="Enter your Email Id"> <br><br>  

                </div> 

                <div class="form-group4 me-4">

                

                <label class="form-label"> Phone no: </label>
                <input type="tel" class="form-label" placeholder="Enter your phone no"> <br><br>
 
                </div>



                <div class="form-group5 text-center ms-1 me-5">

                
                <label class="gender"> Gender: </label>
                <!-- <input type="text" border-2 class="form-label"> -->
                <select id="form-label" class="gen mx-1">
                    <option value="Male"> Male</option>
                    <option value="Female"> Female</option>
                    <option value="Other"> Other</option>
                </select>   <br> <br> 

                </div> 

                <div class="form-group6 text-center ms-1 me-5 mt-3">

                <label class="form-label"> Destination: </label>  
                <select id="form-label" class="dest mx-1">
                    <option value="Chennai"> Chennai</option>
                    <option value="Bengalure"> Bengalure</option>
                    <option value="Delhi"> Delhi</option>
                    <option value="Mumbai"> Mumbai</option>
                    <option value="Coimbatore"> Coimbatore</option>
                    <option value="Calcatta"> Calcatta</option>
                    <option value="Kodaikanal"> Kodaikanal</option>  
                    <option value="Trichy"> Trichy</option>
                    <option value="Goa"> Goa</option> 
                </select>  
                </div><br><br>


                <div class="form-group7">

                
                <label class="form-label"> Budget: </label> 
                <input type="number" class="form-label" placeholder="Enter Budget friendly">   </div><br><br>


                <div class="form-group8" >
                <label class="form-label"> Date:</label> 
                <input type="date" id="form-label">    </div><br><br>

                <div class="formgroup9 text-between">

                
                <button type="submit" class="btn bg-success border-1 text-light shadow"> Submit </button> 
                <button type="reset" class="btn ms-5 bg-warning border-1 text-light"> Reset </button> </div>
                </div>
            </form>
        </div>
    </div> 

    <style>
        *{
            margin: 0%;
            padding: 0%;
        }
        body{
            margin: 2px;
            padding: 5px; 
            
        }  
        .form{
            margin-top: 50px;
        }
        .form-group1{
            margin-left: 500px; 
            display: flex;
            justify-content: center;
            justify-items: center; 
            padding: 1px;
            
            height: 50px; 
            width: 100px;  
            margin-top: -20px;
            padding-bottom: 15px; 
        }  
        .form-group2{
            margin-top: 10px;
            
        }
        .form-group4{
            margin-top: 5px;
        }
        
        .form-group5{
            display: flex;
            justify-content: center;
            margin-left: 5000px;
            margin-top: 2px;
            width: 990px; 

        } 
        .gen{
            height: 30px; 
            
        }  
        .form-group6{
            display: flex;
            justify-content: center;
           margin-top: 10px;
            width: 990px;
        }
        .dest{
            height: 30px; 
             
        } 
        .form-group7{
            margin-top: -10px;
            margin-left: -10px;  

        }
        .form-group8{
            margin-top: -10px; 
            margin-left: -35px;
        } 
        

    </style>
</body> 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
