<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Support Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 shadow">

    <h2 class="text-center mb-4">Customer Support Ticket</h2>
    

    
    <form id="ticketForm">

        <div class="mb-3">
            <label class="form-label">Customer Name</label>
            <input type="text" id="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Issue Category</label>
            <select id="category" class="form-control" required>
                <option value="">Select Category</option>
                <option>Technical Issue</option>
                <option>Billing Issue</option>
                <option>Account Issue</option>
                <option>Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select id="priority" class="form-control" required>
                <option value="">Select Priority</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Issue Description</label>
            <textarea id="issue" class="form-control" rows="4" required></textarea>
        </div> 

        <div class="d-flex gap-5">
            
        <button type="submit" class="btn btn-primary">
            Submit Ticket
        </button>  

        <button class="btn btn-danger"
            onclick="downloadPDF()">
            Download Ticket PDF
        </button>  

        
            <a href="track.html" class="btn btn-success"> Track Ticket</a>
            
        
        

        </div>

    </form>

    <div id="result" class="mt-4"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="hrrps://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script> 
<!-- Download pdf -->
function downloadPDF() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(18);
    doc.text("Customer Support Ticket ", 20, 20);

    doc.setFontSize(12);
    doc.text("Ticket ID: TKT60745", 20, 40);
    doc.text("Customer Name: Sandhiya", 20, 50);
    doc.text("Issue: Login Problem", 20, 60);
    doc.text("Status: Open", 20, 20);

    doc.save(ticketId+".pdf");
}



emailjs.init("WNOQZ8rdsRYUZGCSj");

document.getElementById("ticketForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let ticketId =
    "TKT" + Math.floor(Math.random() * 100000);

    let params = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        category: document.getElementById("category").value,
        priority: document.getElementById("priority").value,
        issue: document.getElementById("issue").value,
        ticket_id: ticketId
    };

    emailjs.send(
        "service_dgf76oi",
        "template_bft20yf",
        params
    )
    .then(function(){

        document.getElementById("result").innerHTML =
        `
        <div class="alert alert-success">
            <h4>Ticket Created Successfully!</h4>
            <p><strong>Ticket ID:</strong> ${ticketId}</p>
            <p><strong>Status:</strong> Open</p>
        </div>
        `;

        document.getElementById("ticketForm").reset();

    })
    .catch(function(error){
        alert("Email Sending Failed");
        console.log(error);
    });

});

alert("Button Clicked");

});  
















</script>




</body>
</html>
